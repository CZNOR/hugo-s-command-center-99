<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CZN</title>
    <meta name="description" content="CZN Command Center" />
    <meta name="author" content="CZN" />

    <!-- Perf: warm up the connections we're about to hit -->
    <link rel="preconnect" href="https://blrafgywziqparlbbznv.supabase.co" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CZN" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#030108" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/czn-logo.png" />

    <!-- Inlined splash: paints instantly (before JS/CSS are parsed) so the PWA never
         shows a black/white flash. React replaces the content of #root once App mounts. -->
    <style>
      html, body { margin: 0; background: #030108; color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        min-height: 100vh; min-height: 100dvh;
      }
      #czn-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 20px;
        background: radial-gradient(ellipse 60% 40% at 50% 30%, rgba(168,85,247,0.12) 0%, transparent 70%), #030108;
        transition: opacity 260ms ease-out;
      }
      #czn-splash img { width: 96px; height: auto; opacity: 0.95; user-select: none; }
      #czn-splash .ring {
        width: 22px; height: 22px; border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.12); border-top-color: #a855f7;
        animation: czn-spin 0.8s linear infinite;
      }
      @keyframes czn-spin { to { transform: rotate(360deg); } }
      /* Hide splash once React has hydrated the root */
      #root:not(:empty) ~ #czn-splash { opacity: 0; pointer-events: none; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="czn-splash" aria-hidden="true">
      <img src="/czn-logo.png" alt="" />
      <div class="ring"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
